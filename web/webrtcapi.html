<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC webcam</title>
    <style>
        button {
            padding: 8px 16px;
        }
        video {
            width: 100%;
        }
        .option {
            margin-bottom: 8px;
        }
        #media {
            max-width: 1280px;
        }
    </style>
</head>

<body>
    <button id="start" onclick="start()">Start</button>
    <button id="stop" style="display: none" onclick="stop()">Stop</button>
    <form class="form-inline" id="echo-form">
        <div class="form-group">
            <p>input text</p>

            <textarea cols="2" rows="3" style="width:600px;height:50px;" class="form-control"
                id="message">test</textarea>
        </div>
        <button type="submit" class="btn btn-default">Send</button>
    </form>

    <div id="media">
        <h2>Media</h2>
        <audio id="audio" autoplay="true"></audio>
        <video id="video" style="width:600px;" autoplay="true" playsinline="true"></video>
    </div>

    <script src="client.js?v=20260321-3"></script>
</body>
<script type="text/javascript" charset="utf-8">
    document.addEventListener('DOMContentLoaded', function () {
        var form = document.getElementById('echo-form');
        var messageInput = document.getElementById('message');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            var message = messageInput.value.trim();
            if (!message) {
                return;
            }
            console.log('message: ' + message);
            try {
                var response = await fetch('/human', {
                    body: JSON.stringify({
                        text: message,
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                });
                if (!response.ok) {
                    throw new Error('Send 失败.');
                }
                messageInput.value = '';
            } catch (error) {
                alert(error.message || error);
            }
        });
    });
</script>

</html>
